<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualisation | JN GRAPHIC</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .visualisation-page { padding-top: 120px; padding-bottom: 80px; min-height: 100vh; }
        .visualisation-container { max-width: 1000px; margin: 0 auto; background: rgba(255,255,255,0.05); border-radius: 30px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .image-viewer { background: #0a0c0f; min-height: 500px; display: flex; align-items: center; justify-content: center; padding: 40px; position: relative; }
        .main-image { max-width: 100%; max-height: 60vh; object-fit: contain; border-radius: 20px; transition: transform 0.3s; cursor: pointer; }
        
        /* Boutons de navigation */
        .nav-buttons {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 20;
        }
        .nav-btn {
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #ff3e3e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            pointer-events: auto;
            color: white;
            font-size: 1.3rem;
            backdrop-filter: blur(5px);
        }
        .nav-btn:hover {
            background: #ff3e3e;
            transform: scale(1.1);
        }
        .nav-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
        .nav-btn.disabled:hover {
            transform: none;
            background: rgba(0,0,0,0.7);
        }
        
        .zoom-controls { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 40px; z-index: 15; }
        .zoom-btn { background: transparent; border: none; color: white; font-size: 1.2rem; cursor: pointer; padding: 5px 10px; border-radius: 50%; transition: all 0.3s; }
        .zoom-btn:hover { background: #ff3e3e; }
        .info-section { padding: 30px; }
        .info-section h1 { font-size: 2rem; margin-bottom: 10px; }
        .category-badge { display: inline-block; background: rgba(255,62,62,0.2); color: #ff3e3e; padding: 5px 15px; border-radius: 50px; font-size: 0.8rem; margin-bottom: 15px; }
        .details-grid { display: flex; flex-wrap: wrap; gap: 20px; margin: 20px 0; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; }
        .detail-item { display: flex; align-items: center; gap: 12px; }
        .detail-item i { width: 35px; height: 35px; background: rgba(255,62,62,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ff3e3e; }
        .detail-item span { color: #aaa; font-size: 0.8rem; }
        .detail-item strong { display: block; color: white; }
        .action-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 25px; flex-wrap: wrap; }
        .btn-action { padding: 12px 25px; border-radius: 50px; font-weight: 700; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; cursor: pointer; border: none; font-size: 0.9rem; transition: all 0.3s; }
        .btn-download { background: #ff3e3e; color: white; }
        .btn-download:hover { background: #ff5555; transform: translateY(-2px); }
        .btn-back { background: transparent; border: 2px solid #ff3e3e; color: white; }
        .btn-back:hover { background: #ff3e3e; transform: translateY(-2px); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; cursor: pointer; }
        .modal.active { display: flex; }
        .modal img { max-width: 95%; max-height: 95%; object-fit: contain; }
        .close-modal { position: absolute; top: 20px; right: 30px; font-size: 2.5rem; color: white; cursor: pointer; }
        .close-modal:hover { color: #ff3e3e; }
        @media (max-width: 768px) { 
            .visualisation-page { padding-top: 100px; } 
            .info-section h1 { font-size: 1.5rem; } 
            .details-grid { flex-direction: column; }
            .nav-btn { width: 40px; height: 40px; font-size: 1rem; }
            .nav-buttons { padding: 0 10px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-circle"><img src="image/Copie de Graphic.svg" alt="JN GRAPHIC"></div>
                <div class="logo-text"><span>JN GRAPHIC</span></div>
            </a>
            <input type="checkbox" id="menu-toggle" class="menu-toggle-checkbox">
            <label for="menu-toggle" class="menu-toggle"><i class="fas fa-bars"></i></label>
            <ul class="nav-links">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="index.html#apropos">À propos</a></li>
                <li><a href="index.html#affiches-sportives">Affiches Sportives</a></li>
                <li><a href="index.html#competences">Compétences</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main class="visualisation-page">
        <div class="container">
            <div class="visualisation-container">
                <div class="image-viewer">
                    <img id="mainImage" class="main-image" src="" alt="Affiche">
                    
                    <!-- Boutons de navigation Précédent / Suivant -->
                    <div class="nav-buttons">
                        <button id="prevBtn" class="nav-btn"><i class="fas fa-chevron-left"></i></button>
                        <button id="nextBtn" class="nav-btn"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    
                    <div class="zoom-controls">
                        <button class="zoom-btn" id="zoomOutBtn"><i class="fas fa-search-minus"></i></button>
                        <button class="zoom-btn" id="zoomInBtn"><i class="fas fa-search-plus"></i></button>
                        <button class="zoom-btn" id="fullscreenBtn"><i class="fas fa-expand"></i></button>
                    </div>
                </div>
                <div class="info-section">
                    <span class="category-badge" id="posterCategory">Catégorie</span>
                    <h1 id="posterTitle">Titre de l'affiche</h1>
                    <p id="posterDescription">Description de l'affiche</p>
                    <div class="details-grid">
                        <div class="detail-item"><i class="fas fa-calendar"></i><div><span>Date</span><strong id="posterDate">--/--/----</strong></div></div>
                        <div class="detail-item"><i class="fas fa-map-marker-alt"></i><div><span>Lieu</span><strong id="posterLocation">---</strong></div></div>
                        <div class="detail-item"><i class="fas fa-file-image"></i><div><span>Format</span><strong id="posterFormat">JPEG</strong></div></div>
                    </div>
                    <div class="action-buttons">
                        <button class="btn-action btn-download" id="downloadBtn"><i class="fas fa-download"></i> Télécharger HD</button>
                        <a href="index.html#affiches-sportives" class="btn-action btn-back"><i class="fas fa-arrow-left"></i> Retour</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="imageModal" class="modal">
        <span class="close-modal">&times;</span>
        <img id="modalImage" src="" alt="Affiche plein écran">
    </div>

    <footer>
        <div class="container">
            <div class="footer-content">
                <a href="index.html" class="logo">JN <span>GRAPHIC</span></a>
                <p>Japhersen Thomas — Design graphique & affiches sportives</p>
                <div class="footer-social">
                    <a href="https://www.instagram.com/jn_graphic8" target="_blank"><i class="fab fa-instagram"></i></a>
                    <a href="https://www.tiktok.com/@jvph009" target="_blank"><i class="fab fa-tiktok"></i></a>
                    <a href="https://www.youtube.com/@not_jvph" target="_blank"><i class="fab fa-youtube"></i></a>
                </div>
                <p class="copyright">© 2024 Japhersen Thomas — JN GRAPHIC</p>
            </div>
        </div>
    </footer>

    <script>
        // Récupérer l'ID depuis l'URL
        const urlParams = new URLSearchParams(window.location.search);
        let currentId = parseInt(urlParams.get('id')) || 1;
        
        // Liste des IDs disponibles
        const availableIds = [1, 2, 3, 4];
        
        // Base de données des affiches
        const posters = {
            '1': {
                title: 'VISUEL - Football',
                category: 'FOOTBALL',
                description: 'Affiche dynamique , design percutant mettant en valeur l\'énergie du ballon d\'or Ousmane Dembélé.',
                image: 'image/dembele.png',
                date: '01.06.26',
                location: 'Guadeloupe',
                format: 'PNG'
            },
            '2': {
                title: 'Affiche Kevin Danois',
                category: 'FOOTBALL',
                description: 'Affiche impactante du joueur Danois qui capture un moment fort.',
                image: 'image/final post.jpg',
                date: '14 février 2026',
                location: 'Guadeloupe',
                format: 'JPG'
            },
            '3': {
                title: 'Visuel du joueur Jude Bellingham',
                category: 'Football',
                description: 'Création qui capture l\'énergie et la détermination de Jude Bellingham balle aux pieds.',
                image: 'image/JUPH.png',
                date: ' 1 Janvier 2026',
                location: 'Guadeloupe',
                format: 'PNG'
            },
            
            
        };
        
        // Fonction pour charger une affiche
        function loadPoster(id) {
            const poster = posters[id];
            if (!poster) return;
            
            // Mettre à jour la page
            document.getElementById('posterTitle').textContent = poster.title;
            document.getElementById('posterCategory').textContent = poster.category;
            document.getElementById('posterDescription').textContent = poster.description;
            document.getElementById('posterDate').textContent = poster.date;
            document.getElementById('posterLocation').textContent = poster.location;
            document.getElementById('posterFormat').textContent = poster.format;
            
            const mainImage = document.getElementById('mainImage');
            mainImage.src = poster.image;
            mainImage.alt = poster.title;
            
            // Réinitialiser le zoom
            currentZoom = 1;
            mainImage.style.transform = 'scale(1)';
            
            // Mettre à jour l'URL sans recharger la page
            const newUrl = `${window.location.pathname}?id=${id}`;
            window.history.pushState({ id: id }, '', newUrl);
            
            // Mettre à jour currentId
            currentId = id;
            
            // Mettre à jour l'état des boutons de navigation
            updateNavButtons();
            
            console.log('✅ Affiche chargée :', poster.title, '(ID:', id, ')');
        }
        
        // Mettre à jour l'état des boutons (activer/désactiver)
        function updateNavButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const currentIndex = availableIds.indexOf(currentId);
            
            if (prevBtn) {
                if (currentIndex <= 0) {
                    prevBtn.classList.add('disabled');
                } else {
                    prevBtn.classList.remove('disabled');
                }
            }
            
            if (nextBtn) {
                if (currentIndex >= availableIds.length - 1) {
                    nextBtn.classList.add('disabled');
                } else {
                    nextBtn.classList.remove('disabled');
                }
            }
        }
        
        // Naviguer vers l'affiche précédente
        function goToPrevious() {
            const currentIndex = availableIds.indexOf(currentId);
            if (currentIndex > 0) {
                const prevId = availableIds[currentIndex - 1];
                loadPoster(prevId);
            }
        }
        
        // Naviguer vers l'affiche suivante
        function goToNext() {
            const currentIndex = availableIds.indexOf(currentId);
            if (currentIndex < availableIds.length - 1) {
                const nextId = availableIds[currentIndex + 1];
                loadPoster(nextId);
            }
        }
        
        // Charger l'affiche initiale
        let poster = posters[currentId] || posters['1'];
        
        // Mettre à jour la page
        document.getElementById('posterTitle').textContent = poster.title;
        document.getElementById('posterCategory').textContent = poster.category;
        document.getElementById('posterDescription').textContent = poster.description;
        document.getElementById('posterDate').textContent = poster.date;
        document.getElementById('posterLocation').textContent = poster.location;
        document.getElementById('posterFormat').textContent = poster.format;
        
        const mainImage = document.getElementById('mainImage');
        mainImage.src = poster.image;
        mainImage.alt = poster.title;
        
        // Initialiser l'état des boutons
        updateNavButtons();
        
        // Événements des boutons de navigation
        document.getElementById('prevBtn').addEventListener('click', goToPrevious);
        document.getElementById('nextBtn').addEventListener('click', goToNext);
        
        // Téléchargement
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const currentPoster = posters[currentId];
            const link = document.createElement('a');
            link.href = currentPoster.image;
            link.download = `${currentPoster.title.replace(/[^a-z0-9]/gi, '_')}.${currentPoster.format.toLowerCase()}`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            alert('✅ Téléchargement lancé !');
        });
        
        // Zoom
        let currentZoom = 1;
        document.getElementById('zoomInBtn').addEventListener('click', () => {
            if (currentZoom < 2.5) { currentZoom += 0.25; mainImage.style.transform = `scale(${currentZoom})`; }
        });
        document.getElementById('zoomOutBtn').addEventListener('click', () => {
            if (currentZoom > 0.5) { currentZoom -= 0.25; mainImage.style.transform = `scale(${currentZoom})`; }
        });
        mainImage.addEventListener('dblclick', () => { currentZoom = 1; mainImage.style.transform = 'scale(1)'; });
        
        // Plein écran modal
        const modal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            const currentPoster = posters[currentId];
            modalImage.src = currentPoster.image;
            modal.classList.add('active');
        });
        document.querySelector('.close-modal').addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') modal.classList.remove('active'); });
        
        // Flèches du clavier pour naviguer
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                goToPrevious();
            } else if (e.key === 'ArrowRight') {
                goToNext();
            }
        });
        
        // Menu burger
        const menuToggle = document.getElementById('menu-toggle');
        const navLinks = document.querySelector('.nav-links');
        if (menuToggle && navLinks) {
            menuToggle.addEventListener('change', function() {
                if (this.checked) { navLinks.classList.add('show'); document.body.style.overflow = 'hidden'; }
                else { navLinks.classList.remove('show'); document.body.style.overflow = ''; }
            });
            document.querySelectorAll('.nav-links a').forEach(link => {
                link.addEventListener('click', () => { menuToggle.checked = false; navLinks.classList.remove('show'); document.body.style.overflow = ''; });
            });
        }
        
        console.log('✅ Page chargée pour :', poster.title, '(ID:', currentId, ')');
    </script>
</body>
</html>
